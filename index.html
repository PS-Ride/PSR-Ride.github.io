<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PS Ride</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, sans-serif;
background:#f6f8fb;
color:#222;
}


.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:white;
box-shadow:0 2px 10px #ddd;
}


.logo{
font-size:28px;
font-weight:bold;
color:#00a86b;
}


.hero{
min-height:80vh;
display:flex;
align-items:center;
justify-content:space-between;
padding:50px;
gap:30px;
}


.hero-text{
max-width:500px;
animation:slide 1s ease;
}


.hero-text h1{
font-size:55px;
margin:0;
}


.hero-text p{
font-size:22px;
color:#666;
margin:20px 0;
}


.buttons button{

padding:15px 30px;
border:none;
border-radius:30px;
margin:10px;
font-size:17px;
cursor:pointer;
}


.rider{
background:#00a86b;
color:white;
}


.driver{
background:#222;
color:white;
}


.hero-image img{

width:500px;
max-width:100%;
border-radius:25px;
animation:zoom 5s infinite alternate;

}


.cards{

display:flex;
justify-content:center;
gap:20px;
padding:40px;
flex-wrap:wrap;

}


.card{

background:white;
padding:25px;
width:250px;
border-radius:20px;
box-shadow:0 5px 20px #ddd;
text-align:center;

}



@keyframes slide{

from{
opacity:0;
transform:translateX(-50px);
}

to{
opacity:1;
transform:translateX(0);
}

}


@keyframes zoom{

from{
transform:scale(1);
}

to{
transform:scale(1.08);
}

}



footer{

background:#111;
color:white;
padding:30px;
text-align:center;

}



</style>

</head>


<body>


<div class="navbar">

<div class="logo">
PS Ride
</div>

<div>
Safe • Fast • Reliable
</div>

</div>



<section class="hero">


<div class="hero-text">


<h1>
Your Ride, Your Way 🚗
</h1>


<p>
Book safe and affordable rides anytime.
Drive with us and earn more.
</p>



<div class="buttons">


<button class="rider"
onclick="location.href='rider-signup.html'">

🚗 Rider (Book a Ride)

</button>



<button class="driver"
onclick="location.href='driver-info.html'">

🚘 Driver (Earn Money)

</button>


</div>


</div>



<div class="hero-image">


<img src="https://images.unsplash.com/photo-1502877338535-766e1452684a?w=1200">


</div>



</section>




<div class="cards">


<div class="card">

<h2>🚗 Ride Booking</h2>

<p>
Fast rides at your location.
</p>

</div>



<div class="card">

<h2>🚘 Drivers</h2>

<p>
Join PS Ride and earn.
</p>

</div>



<div class="card">

<h2>🛡 Safety</h2>

<p>
Secure and trusted travel.
</p>

</div>


</div>



<footer>

<h3>PS Ride Customer Care</h3>

<p>
Support available 24/7
</p>

</footer>



</body>
    </html>
