<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PS Ride</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}


body{

min-height:100vh;
background:
linear-gradient(135deg,#06141b,#0b2e2a);
color:white;
overflow-x:hidden;

}


body:before{

content:"";
position:fixed;
width:400px;
height:400px;
background:#00ff99;
filter:blur(150px);
opacity:.25;
top:-100px;
left:-100px;
animation:glow 5s infinite alternate;

}


.header{

display:flex;
justify-content:space-between;
align-items:center;
padding:25px 8%;

}


.logo{

font-size:32px;
font-weight:bold;
color:#00ff99;

}


.tag{

color:#aaa;

}



.hero{

min-height:75vh;
display:flex;
align-items:center;
justify-content:space-between;
padding:40px 8%;
gap:30px;

}



.heroText{

animation:up 1s ease;

}


.heroText h1{

font-size:60px;
line-height:1.1;

}


.heroText h1 span{

color:#00ff99;

}


.heroText p{

margin:25px 0;
font-size:20px;
color:#ccc;

}



.buttons button{

padding:16px 35px;
border-radius:40px;
border:none;
margin-right:15px;
cursor:pointer;
font-size:16px;
transition:.3s;

}


.buttons button:hover{

transform:scale(1.08);

}



.rider{

background:#00ff99;
color:#001;

}



.driver{

background:white;
color:#111;

}




.carBox{

width:45%;
animation:float 4s infinite alternate;

}


.carBox img{

width:100%;
border-radius:30px;
box-shadow:0 0 40px #00ff9955;

}



.features{

display:flex;
justify-content:center;
gap:25px;
padding:40px 8%;
flex-wrap:wrap;

}



.card{

background:#ffffff12;
backdrop-filter:blur(15px);
padding:25px;
border-radius:25px;
width:250px;
text-align:center;
border:1px solid #ffffff22;

}



footer{

text-align:center;
padding:25px;
color:#aaa;

}



@keyframes float{

from{
transform:translateY(0);
}

to{
transform:translateY(-20px);
}

}


@keyframes up{

from{

opacity:0;
transform:translateY(50px);

}

to{

opacity:1;
transform:translateY(0);

}

}



@keyframes glow{

from{
transform:scale(1);
}

to{
transform:scale(1.5);
}

}


@media(max-width:800px){

.hero{

flex-direction:column;

}

.heroText h1{

font-size:42px;

}

.carBox{

width:90%;

}

}



</style>

</head>


<body>


<div class="header">

<div class="logo">
PS Ride
</div>

<div class="tag">
Safe • Fast • Reliable
</div>

</div>



<section class="hero">


<div class="heroText">


<h1>
Your <span>Ride</span><br>
Starts Here
</h1>


<p>
Book safe rides or join as a driver.
</p>


<div class="buttons">


<button class="rider"
onclick="location.href='rider-signup.html'">

🚗 Book Ride

</button>



<button class="driver"
onclick="location.href='driver-info.html'">

🚘 Drive With Us

</button>


</div>


</div>



<div class="carBox">

<img src="https://images.unsplash.com/photo-1502877338535-766e1452684a?w=900">

</div>



</section>




<div class="features">


<div class="card">

<h2>🚗</h2>
<h3>Fast Rides</h3>
<p>Quick pickup</p>

</div>



<div class="card">

<h2>🛡</h2>
<h3>Safety</h3>
<p>Trusted travel</p>

</div>



<div class="card">

<h2>💰</h2>
<h3>Drivers</h3>
<p>Earn more</p>

</div>



</div>



<footer>

PS Ride Customer Care

</footer>


</body>
  </html>
