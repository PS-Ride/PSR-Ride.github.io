<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PS Ride - Ride Booking</title>

<style>
*{
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    margin:0;
    background:#f5f5f5;
}

.header{
    background:#111;
    color:white;
    padding:20px;
    text-align:center;
}

.logo{
    font-size:30px;
    font-weight:bold;
}

.container{
    max-width:500px;
    margin:30px auto;
    padding:20px;
}

.card{
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 15px #ccc;
}

h2{
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #ddd;
}

button{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#00a86b;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    opacity:.8;
}

.footer{
    text-align:center;
    margin-top:30px;
    color:#777;
}

</style>

</head>

<body>

<div class="header">
<div class="logo">PS Ride 🚗</div>
<p>Fast & Easy Ride Booking</p>
</div>


<div class="container">

<div class="card">

<h2>Book Your Ride</h2>

<input type="text" placeholder="Pickup Location">

<input type="text" placeholder="Drop Location">


<button>
Request Ride
</button>


<button>
Driver Signup
</button>


<button>
Rider Login
</button>


</div>


<div class="footer">
<p>PS Ride © 2026</p>
<p>Ride Booking Platform Under Development</p>
</div>


</div>

</body>
</html>
