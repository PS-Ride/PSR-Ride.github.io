<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PS Ride</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, sans-serif;
background:#ffffff;
color:#111;
}


.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 30px;
}


.logo{
font-size:28px;
font-weight:bold;
color:#00a86b;
}


.hero{

min-height:80vh;
display:flex;
align-items:center;
justify-content:space-between;
padding:30px;
gap:20px;

}


.left{

width:45%;
animation:fade 1s ease;

}


.left h1{

font-size:48px;
margin:0;

}


.left span{

color:#00a86b;

}


.left p{

font-size:18px;
color:#666;

}



.btns button{

padding:14px 25px;
border:0;
border-radius:30px;
margin:8px;
font-size:16px;
cursor:pointer;

}


.rider{

background:#00a86b;
color:white;

}


.driver{

background:#111;
color:white;

}



.right img{

width:450px;
max-width:100%;
border-radius:20px;
animation:float 4s infinite alternate;

}



.services{

display:flex;
justify-content:center;
gap:20px;
padding:30px;
flex-wrap:wrap;

}


.box{

width:250px;
padding:25px;
border-radius:20px;
background:#f7f7f7;
text-align:center;
box-shadow:0 5px 20px #ddd;

}


footer{

background:#111;
color:white;
padding:25px;
text-align:center;

}



@keyframes fade{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}



@keyframes float{

from{
transform:translateY(0);
}

to{
transform:translateY(-15px);
}

}


</style>

</head>


<body>


<div class="header">

<div class="logo">
PS Ride
</div>

<div>
Safe • Fast • Ride
</div>

</div>



<section class="hero">


<div class="left">


<h1>

Move with <span>PS Ride</span>

</h1>


<p>

Book rides easily. Travel safely.

</p>



<div class="btns">


<button class="rider"
onclick="location.href='rider-signup.html'">

🚗 Book Ride

</button>



<button class="driver"
onclick="location.href='driver-info.html'">

🚘 Drive With Us

</button>


</div>


</div>



<div class="right">


<img src="https://images.unsplash.com/photo-1449824913935-59a10b8d2000?w=900">


</div>


</section>




<div class="services">


<div class="box">

<h2>🚗</h2>
<h3>Ride Booking</h3>
<p>Quick rides anytime</p>

</div>



<div class="box">

<h2>🚘</h2>
<h3>Drivers</h3>
<p>Earn with PS Ride</p>

</div>



<div class="box">

<h2>🛡</h2>
<h3>Safety</h3>
<p>Secure travel</p>

</div>


</div>




<footer>

PS Ride Customer Care

</footer>



</body>
</html>
