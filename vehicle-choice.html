<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vehicle Choice - PS Ride</title>

<style>

/* ===== GLOBAL ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(135deg,#f4fff8,#eefcf4,#ffffff);
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

/* ===== CARD ===== */
.card{
background:rgba(255,255,255,.82);
backdrop-filter:blur(18px);
max-width:500px;
width:100%;
padding:30px;
border-radius:30px;
box-shadow:0 30px 80px rgba(0,0,0,.12);
text-align:center;
animation:fadeIn .5s ease;
}

/* ===== TITLE ===== */
h2{
font-size:26px;
font-weight:900;
color:#111;
margin-bottom:20px;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
}

/* ===== BUTTONS ===== */
button{
width:100%;
padding:16px;
margin:10px 0;
border:none;
border-radius:30px;
font-size:17px;
font-weight:800;
cursor:pointer;
transition:.25s;
}

button:hover{
transform:translateY(-2px);
}

/* PRIMARY BUTTON */
.primary{
background:linear-gradient(135deg,#00a86b,#00d084);
color:white;
box-shadow:0 15px 35px rgba(0,168,107,.3);
}

/* BACK BUTTON */
.back{
background:linear-gradient(135deg,#111,#333);
color:white;
width:auto;
padding:10px 18px;
border-radius:25px;
margin-bottom:15px;
}

/* ===== SVG ICON ===== */
.icon{
width:26px;
height:26px;
display:inline-flex;
}

/* ===== ANIMATION ===== */
@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

</style>

</head>

<body>

<div class="card">

<!-- BACK BUTTON (NO LINK CHANGE) -->
<button class="back" onclick="history.back()">← Back</button>

<!-- TITLE WITH SVG (emoji removed) -->
<h2>
<svg class="icon" viewBox="0 0 24 24" fill="none"
stroke="currentColor" stroke-width="2">

<path d="M3 13l2-6h14l2 6"/>
<circle cx="7" cy="18" r="1"/>
<circle cx="17" cy="18" r="1"/>

</svg>

Select Vehicle Type

</h2>

<!-- ELECTRIC -->
<button class="primary" onclick="location.href='electric-vehicle.html'">

<svg class="icon" viewBox="0 0 24 24" fill="none"
stroke="currentColor" stroke-width="2">

<path d="M13 2L3 14h7l-1 8 10-12h-7l1-8z"/>

</svg>

Electric

</button>

<!-- NON ELECTRIC -->
<button class="primary" onclick="location.href='non-electric-vehicle.html'">

<svg class="icon" viewBox="0 0 24 24" fill="none"
stroke="currentColor" stroke-width="2">

<path d="M3 13l2-6h14l2 6"/>
<circle cx="7" cy="18" r="1"/>
<circle cx="17" cy="18" r="1"/>

</svg>

Non Electric

</button>

</div>

</body>
</html>
