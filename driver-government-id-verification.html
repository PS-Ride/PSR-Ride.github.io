<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Driver Government ID Verification - PS Ride</title>

<style>

/* ===== GLOBAL ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(135deg,#f4fff8,#eefcf4,#ffffff);
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

/* ===== CARD ===== */
.card{
background:rgba(255,255,255,.82);
backdrop-filter:blur(18px);
max-width:500px;
width:100%;
padding:30px;
border-radius:30px;
box-shadow:0 30px 80px rgba(0,0,0,.12);
animation:fadeIn .5s ease;
}

/* ===== TITLE ===== */
h2{
font-size:26px;
font-weight:900;
color:#111;
text-align:center;
margin-bottom:10px;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
}

/* ===== NOTE BOX ===== */
.note{
background:rgba(0,168,107,.08);
border:1px solid rgba(0,168,107,.2);
padding:12px;
border-radius:15px;
font-size:14px;
font-weight:600;
color:#444;
margin:15px 0;
line-height:20px;
}

/* ===== LABEL ===== */
label{
font-weight:700;
color:#333;
display:block;
margin-top:12px;
}

/* ===== INPUT ===== */
input{
width:100%;
padding:14px;
margin:8px 0;
border-radius:14px;
border:1px solid #ddd;
font-size:14px;
outline:none;
transition:.3s;
background:white;
}

input:focus{
border-color:#00a86b;
box-shadow:0 0 0 4px rgba(0,168,107,.12);
}

/* ===== BUTTON ===== */
button{
width:100%;
padding:16px;
margin-top:15px;
border:none;
border-radius:30px;
font-size:16px;
font-weight:800;
cursor:pointer;
transition:.25s;
}

button:hover{
transform:translateY(-2px);
}

/* PRIMARY */
.primary{
background:linear-gradient(135deg,#00a86b,#00d084);
color:white;
box-shadow:0 15px 35px rgba(0,168,107,.3);
}

/* BACK */
.back{
background:linear-gradient(135deg,#111,#333);
color:white;
width:auto;
padding:10px 18px;
border-radius:25px;
margin-bottom:10px;
}

/* ===== SVG ===== */
.icon{
width:26px;
height:26px;
}

/* ===== ANIMATION ===== */
@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

</style>

</head>

<body>

<div class="card">

<!-- BACK (NO LINK CHANGE) -->
<button class="back" onclick="history.back()">← Back</button>

<!-- TITLE WITH SVG -->
<h2>

<svg class="icon" viewBox="0 0 24 24" fill="none"
stroke="currentColor" stroke-width="2">

<rect x="3" y="4" width="18" height="16" rx="3"/>
<path d="M8 10h8M8 14h6"/>

</svg>

Government ID Verification

</h2>

<!-- NOTE -->
<div class="note">
Please upload clear CNIC images. All details must be visible.
</div>

<!-- FRONT -->
<label>CNIC Front Side</label>
<input type="file" accept="image/*">

<!-- BACK -->
<label>CNIC Back Side</label>
<input type="file" accept="image/*">

<!-- NEXT -->
<button class="primary" onclick="location.href='Driver face-verification.html'">
Next →
</button>

</div>

</body>
</html>
