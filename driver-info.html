<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driver Info - PS Ride</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;

/* PREMIUM BACKGROUND */
background:linear-gradient(135deg,#f4fff8,#eefcf4,#ffffff);
}

/* GLASS CARD (UBER STYLE) */
.card{
width:100%;
max-width:520px;
padding:30px;
border-radius:35px;

background:rgba(255,255,255,0.82);
backdrop-filter:blur(18px);

box-shadow:0 30px 80px rgba(0,0,0,0.12);
animation:fadeIn .5s ease;
}

/* TITLE */
h2{
text-align:center;
font-size:26px;
font-weight:900;
color:#111;
margin-bottom:20px;
}

/* INPUTS */
input,select{
width:100%;
padding:14px;
margin:10px 0;

border-radius:15px;
border:1px solid #ddd;

font-size:15px;

transition:.3s;
background:white;
}

input:focus,select:focus{
border-color:#00a86b;
box-shadow:0 0 0 4px rgba(0,168,107,0.12);
outline:none;
}

/* BUTTON BASE */
button{
width:100%;
padding:16px;
margin-top:12px;

border:none;
border-radius:30px;

font-size:16px;
font-weight:800;

cursor:pointer;
transition:.25s;
}

/* PRIMARY BUTTON (YES / NEXT) */
button:not(.back){
background:linear-gradient(135deg,#00a86b,#00d084);
color:white;
box-shadow:0 15px 35px rgba(0,168,107,0.35);
}

/* BACK BUTTON (BLACK LIKE REQUESTED) */
.back{
background:#111;
color:white;
width:auto;
padding:10px 18px;
border-radius:20px;
margin-bottom:10px;
}

/* HOVER EFFECT */
button:hover{
transform:translateY(-2px);
}

/* HIDDEN BOX */
.hidden{
display:none;
}

/* ANIMATION */
@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

</style>
</head>

<body>

<div class="card">

<button class="back" onclick="history.back()">⬅ Back</button>

<h2>Driver Signup 🚘</h2>

<input placeholder="First Name (as per Government ID)">
<input placeholder="Last Name (as per Government ID)">

<input type="tel" placeholder="+92 3XXXXXXXXX">

<input placeholder="Email Address">
<input placeholder="CNIC Number without spaces">

<select>
<option>Select Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<select>
<option>Select City</option>
<option>Lahore</option>
<option>Karachi</option>
<option>Islamabad</option>
<option>Rawalpindi</option>
<option>Faisalabad</option>
<option>Multan</option>
<option>Peshawar</option>
<option>Quetta</option>
<option>Gujranwala</option>
<option>Sialkot</option>
<option>Gujrat</option>
<option>Jhelum</option>
<option>Sargodha</option>
<option>Bahawalpur</option>
<option>Hyderabad</option>
<option>Sukkur</option>
<option>Larkana</option>
</select>

<select id="license" onchange="checkLicense()">
<option>License Holder?</option>
<option value="yes">Yes</option>
<option value="no">No</option>
</select>

<div id="licenseBox" class="hidden">
<input placeholder="License Number">
</div>

<!-- NEXT BUTTON SAME LINK (NOT CHANGED) -->
<button onclick="location.href='vehicle-choice.html'">
Next →
</button>

</div>

<script>

function checkLicense(){
let value=document.getElementById("license").value;
let box=document.getElementById("licenseBox");

if(value=="yes"){
box.style.display="block";
}else{
box.style.display="none";
}
}

</script>

</body>
</html>
