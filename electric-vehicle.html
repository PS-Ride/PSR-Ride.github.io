<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Electric Vehicle - PS Ride</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}

.card{
background:white;
max-width:500px;
margin:auto;
padding:25px;
border-radius:15px;
}

input,select{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
background:#00a86b;
color:white;
font-size:16px;
}

.back{
background:#555;
width:auto;
padding:8px 15px;
}

</style>

</head>


<body>


<div class="card">


<button class="back" onclick="history.back()">← Back</button>


<h2>Electric Vehicle Details ⚡</h2>



<select id="type" onchange="updateCompany()">

<option>Select Vehicle Type</option>

<option>Electric Bike</option>
<option>Electric Rickshaw</option>
<option>Electric Car</option>

</select>




<select id="company" onchange="updateModel()">

<option>Select Company</option>

</select>




<select id="model">

<option>Select Model</option>

</select>



<input placeholder="Custom Model (Optional)">



<select>

<option>Select Model Year</option>

<option>2020</option>
<option>2021</option>
<option>2022</option>
<option>2023</option>
<option>2024</option>
<option>2025</option>
<option>2026</option>

</select>




<input placeholder="Registration Number">


<input placeholder="Battery Capacity (mAh / kWh)">



<button onclick="location.href='driver-government-id-verification.html'">

Next →

</button>



</div>




<script>


function updateCompany(){

let type=document.getElementById("type").value;

let company=document.getElementById("company");


company.innerHTML="<option>Select Company</option>";



if(type=="Electric Bike"){

company.innerHTML += `
<option>Yadea</option>
<option>Metro</option>
<option>United</option>
<option>Other</option>
`;

}


if(type=="Electric Rickshaw"){

company.innerHTML += `
<option>Metro</option>
<option>Qingqi</option>
<option>Other</option>
`;

}


if(type=="Electric Car"){

company.innerHTML += `
<option>BYD</option>
<option>MG</option>
<option>Other</option>
`;

}


}



function updateModel(){

let type=document.getElementById("type").value;

let company=document.getElementById("company").value;

let model=document.getElementById("model");


model.innerHTML="<option>Select Model</option>";



if(type=="Electric Bike" && company=="Yadea"){

model.innerHTML += `
<option>G5</option>
<option>T5</option>
`;

}



if(type=="Electric Bike" && company=="Metro"){

model.innerHTML += `
<option>T9</option>
<option>M6</option>
`;

}



if(type=="Electric Bike" && company=="United"){

model.innerHTML += `
<option>US 100</option>
<option>US 200</option>
`;

}



if(type=="Electric Car" && company=="BYD"){

model.innerHTML += `
<option>Atto 3</option>
<option>Dolphin</option>
`;

}



if(type=="Electric Car" && company=="MG"){

model.innerHTML += `
<option>ZS EV</option>
`;

}



if(type=="Electric Rickshaw"){

model.innerHTML += `
<option>Electric Rickshaw Model</option>
`;

}



model.innerHTML += "<option>Custom</option>";

}


</script>



</body>

</html>
