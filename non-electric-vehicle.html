<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Non Electric Vehicle - PS Ride</title>

<style>

/* ===== GLOBAL ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(135deg,#f4fff8,#eefcf4,#ffffff);
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

/* ===== CARD (RIDER STYLE GLASS) ===== */
.card{
background:rgba(255,255,255,.82);
backdrop-filter:blur(18px);
max-width:520px;
width:100%;
padding:30px;
border-radius:30px;
box-shadow:0 30px 80px rgba(0,0,0,.12);
animation:fadeIn .5s ease;
}

/* ===== TITLE ===== */
h2{
text-align:center;
font-size:28px;
font-weight:900;
color:#111;
margin-bottom:15px;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
}

/* ===== INPUTS ===== */
input,select{
width:100%;
padding:14px;
margin:8px 0;
border-radius:14px;
border:1px solid #ddd;
font-size:15px;
outline:none;
transition:.3s;
}

input:focus,select:focus{
border-color:#00a86b;
box-shadow:0 0 0 4px rgba(0,168,107,.12);
}

/* ===== BUTTONS ===== */
button{
width:100%;
padding:15px;
margin-top:12px;
border:none;
border-radius:30px;
font-size:16px;
font-weight:800;
cursor:pointer;
transition:.25s;
}

button:hover{
transform:translateY(-2px);
}

/* PRIMARY */
.next{
background:linear-gradient(135deg,#00a86b,#00d084);
color:white;
box-shadow:0 15px 35px rgba(0,168,107,.3);
}

/* BACK BUTTON (NO CHANGE LINK) */
.back{
background:linear-gradient(135deg,#111,#333);
color:white;
width:auto;
padding:10px 18px;
border-radius:25px;
margin-bottom:10px;
}

/* HIDE BOX */
.hide{
display:none;
}

/* ===== ICON SVG ===== */
.icon{
width:34px;
height:34px;
display:inline-flex;
}

/* ===== ANIMATION ===== */
@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

</style>

</head>

<body>

<div class="card">

<!-- BACK (UNCHANGED LINK BEHAVIOR) -->
<button class="back" onclick="history.back()">← Back</button>

<!-- TITLE WITH SVG (emoji removed) -->
<h2>

<svg class="icon" viewBox="0 0 24 24" fill="none"
stroke="currentColor" stroke-width="2">

<path d="M3 13l2-6h14l2 6"/>
<path d="M5 13v5h0"/>
<path d="M19 13v5h0"/>
<circle cx="7" cy="18" r="1"/>
<circle cx="17" cy="18" r="1"/>

</svg>

Vehicle Details

</h2>

<select id="type" onchange="updateCompany()">

<option>Select Vehicle Type</option>
<option>Bike</option>
<option>Car</option>
<option>Van</option>

</select>

<select id="company" onchange="updateModel()">

<option>Select Company</option>

</select>

<select id="model">

<option>Select Model</option>

</select>

<input placeholder="Custom Model (Optional)">

<select>

<option>Select Model Year</option>
<option>2000</option>
<option>2001</option>
<option>2002</option>
<option>2003</option>
<option>2004</option>
<option>2005</option>
<option>2006</option>
<option>2007</option>
<option>2008</option>
<option>2009</option>
<option>2010</option>
<option>2011</option>
<option>2012</option>
<option>2013</option>
<option>2014</option>
<option>2015</option>
<option>2016</option>
<option>2017</option>
<option>2018</option>
<option>2019</option>
<option>2020</option>
<option>2021</option>
<option>2022</option>
<option>2023</option>
<option>2024</option>
<option>2025</option>
<option>2026</option>

</select>

<!-- AC BOX (same logic) -->
<div id="acBox" class="hide">

<select>
<option>Select AC Type</option>
<option>AC</option>
<option>Non AC</option>
</select>

</div>

<input placeholder="Registration Number">

<!-- NEXT BUTTON (LINK SAME) -->
<button class="next" onclick="location.href='driver-government-id-verification.html'">
Next →
</button>

</div>

<script>

function updateCompany(){

let type=document.getElementById("type").value;
let company=document.getElementById("company");
let ac=document.getElementById("acBox");

company.innerHTML="<option>Select Company</option>";

if(type=="Bike"){

company.innerHTML+=`
<option>Honda</option>
<option>Yamaha</option>
<option>Suzuki</option>
`;

ac.style.display="none";

}

if(type=="Car"){

company.innerHTML+=`
<option>Toyota</option>
<option>Honda</option>
<option>Suzuki</option>
`;

ac.style.display="block";

}

if(type=="Van"){

company.innerHTML+=`
<option>Suzuki</option>
<option>Toyota</option>
<option>FAW</option>
`;

ac.style.display="none";

}

}

function updateModel(){

let type=document.getElementById("type").value;
let company=document.getElementById("company").value;
let model=document.getElementById("model");

model.innerHTML="<option>Select Model</option>";

if(type=="Bike" && company=="Honda"){
model.innerHTML+=`
<option>CD 70</option>
<option>CG 125</option>
<option>CB 125F</option>
`;
}

if(type=="Car" && company=="Toyota"){
model.innerHTML+=`
<option>Corolla</option>
<option>Yaris</option>
<option>Vitz</option>
`;
}

model.innerHTML+="<option>Custom</option>";

}

</script>

</body>
</html>
