<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Non Electric Vehicle - PS Ride</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}

.card{
background:white;
max-width:500px;
margin:auto;
padding:25px;
border-radius:15px;
}

input,select{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
background:#00a86b;
color:white;
font-size:16px;
}

.back{
background:#555;
width:auto;
padding:8px 15px;
}

.hide{
display:none;
}

</style>

</head>


<body>


<div class="card">


<button class="back" onclick="history.back()">← Back</button>


<h2>Non Electric Vehicle 🚗</h2>



<select id="type" onchange="updateCompany()">

<option>Select Vehicle Type</option>
<option>Bike</option>
<option>Car</option>
<option>Van</option>

</select>




<select id="company" onchange="updateModel()">

<option>Select Company</option>

</select>




<select id="model">

<option>Select Model</option>

</select>


<input placeholder="Custom Model (Optional)">



<select id="year">

<option>Select Model Year</option>

</select>



<div id="acBox" class="hide">


<select>

<option>Select AC Type</option>
<option>AC</option>
<option>Non AC</option>

</select>


</div>




<input placeholder="Registration Number">



<button onclick="location.href='driver-government-id-verification.html'">

Next →

</button>



</div>




<script>


let year=document.getElementById("year");


for(let i=2000;i<=2026;i++){

year.innerHTML += `<option>${i}</option>`;

}



function updateCompany(){

let type=document.getElementById("type").value;

let company=document.getElementById("company");

let ac=document.getElementById("acBox");


company.innerHTML="<option>Select Company</option>";


if(type=="Bike"){

company.innerHTML += `
<option>Honda</option>
<option>Yamaha</option>
<option>Suzuki</option>
`;

ac.style.display="none";

}


if(type=="Car"){

company.innerHTML += `
<option>Toyota</option>
<option>Honda</option>
<option>Suzuki</option>
`;

ac.style.display="block";

}


}



function updateModel(){


let type=document.getElementById("type").value;

let company=document.getElementById("company").value;

let model=document.getElementById("model");


model.innerHTML="<option>Select Model</option>";



if(type=="Bike" && company=="Honda"){

model.innerHTML += `
<option>CD 70</option>
<option>CG 125</option>
<option>CB 125F</option>
`;

}



if(type=="Bike" && company=="Yamaha"){

model.innerHTML += `
<option>YBR 125</option>
<option>YBZ 125</option>
`;

}



if(type=="Bike" && company=="Suzuki"){

model.innerHTML += `
<option>GD 110</option>
<option>GS 150</option>
`;

}



if(type=="Car" && company=="Toyota"){

model.innerHTML += `
<option>Corolla</option>
<option>Yaris</option>
<option>Vitz</option>
`;

}



if(type=="Car" && company=="Honda"){

model.innerHTML += `
<option>Civic</option>
<option>City</option>
`;

}



if(type=="Car" && company=="Suzuki"){

model.innerHTML += `
<option>Alto</option>
<option>Cultus</option>
<option>Wagon R</option>
`;

}



model.innerHTML += "<option>Custom</option>";


}


</script>


</body>

  </html>
