<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Driver Signup - PS Ride</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}

.card{
background:white;
max-width:550px;
margin:auto;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px #ccc;
}

h1,h3{
text-align:center;
}

input,select{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
}

.phone{
display:flex;
gap:10px;
}

.code{
width:30%;
}

.number{
width:70%;
}

button{
width:100%;
padding:14px;
background:#00a86b;
color:white;
border:none;
border-radius:8px;
font-size:16px;
}

.hidden{
display:none;
}

</style>

</head>


<body>


<div class="card">

<h1>Driver Signup 🚘</h1>


<input placeholder="First Name (as per Government ID)">

<input placeholder="Last Name (as per Government ID)">



<div class="phone">

<input class="code" value="+92" readonly>

<input class="number" placeholder="Number without 0">

</div>



<input placeholder="Email Address">

<input placeholder="CNIC Number without spaces">



<select>

<option>Select Gender</option>
<option>Male</option>
<option>Female</option>

</select>




<select>

<option>Select City</option>
<option>Lahore</option>
<option>Karachi</option>
<option>Islamabad</option>
<option>Rawalpindi</option>
<option>Faisalabad</option>
<option>Multan</option>
<option>Peshawar</option>
<option>Quetta</option>
<option>Sialkot</option>
<option>Gujranwala</option>
<option>Gujrat</option>
<option>Jhelum</option>
<option>Sargodha</option>
<option>Bahawalpur</option>
<option>Hyderabad</option>
<option>Sukkur</option>
<option>Larkana</option>
<option>Mardan</option>
<option>Abbottabad</option>
<option>Other</option>

</select>



<h3>License</h3>


<select id="license" onchange="licenseCheck()">

<option value="">License Holder?</option>
<option value="yes">Yes</option>
<option value="no">No</option>

</select>


<div id="licenseBox" class="hidden">

<input placeholder="License Number">

</div>




<h3>Vehicle</h3>


<select id="type" onchange="vehicleChange()">

<option>Select Vehicle Type</option>
<option>Bike</option>
<option>Car</option>

</select>



<select id="company">

<option>Select Company</option>

</select>



<select>

<option>Select Model</option>

<option>Honda CD 70</option>
<option>Honda CG 125</option>
<option>Honda CB 125F</option>

<option>Toyota Corolla</option>
<option>Toyota Yaris</option>
<option>Honda Civic</option>
<option>Honda City</option>

<option>Suzuki Alto</option>
<option>Suzuki Cultus</option>
<option>Suzuki Wagon R</option>

<option>Loader Van</option>

</select>



<select>

<option>Select Model Year</option>

<option>2000</option>
<option>2001</option>
<option>2002</option>
<option>2003</option>
<option>2004</option>
<option>2005</option>
<option>2006</option>
<option>2007</option>
<option>2008</option>
<option>2009</option>
<option>2010</option>
<option>2011</option>
<option>2012</option>
<option>2013</option>
<option>2014</option>
<option>2015</option>
<option>2016</option>
<option>2017</option>
<option>2018</option>
<option>2019</option>
<option>2020</option>
<option>2021</option>
<option>2022</option>
<option>2023</option>
<option>2024</option>
<option>2025</option>
<option>2026</option>

</select>



<input placeholder="Vehicle Registration Number">



<button onclick="history.back()" style="background:#555;">
⬅ Back
</button>


<button>
Create Driver Account
</button>


</div>



<script>

function licenseCheck(){

let value=document.getElementById("license").value;

let box=document.getElementById("licenseBox");


if(value=="yes"){
box.style.display="block";
}
else{
box.style.display="none";
}

}



function vehicleChange(){

let type=document.getElementById("type").value;

let company=document.getElementById("company");


company.innerHTML="";

if(type=="Bike"){

company.innerHTML=
"<option>Honda</option><option>Yamaha</option><option>Suzuki</option>";

}


if(type=="Car"){

company.innerHTML=
"<option>Toyota</option><option>Honda</option><option>Suzuki</option>";

}

}


</script>


</body>
  </html>
