<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Driver Signup - PS Ride</title>


<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}


.card{
background:white;
max-width:550px;
margin:auto;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px #ccc;
}


h1{
text-align:center;
}


input,select{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
}


.phone{
display:flex;
gap:10px;
}


.code{
width:30%;
}


.number{
width:70%;
}


button{
width:100%;
padding:14px;
background:#00a86b;
color:white;
border:none;
border-radius:8px;
font-size:16px;
}


</style>


</head>


<body>


<div class="card">


<h1>Driver Signup 🚘</h1>



<input placeholder="First Name (as per Government ID)">


<input placeholder="Last Name (as per Government ID)">



<div class="phone">

<input class="code" value="+92" readonly>

<input class="number" placeholder="Phone number without 0">

</div>



<input placeholder="Email Address">


<input placeholder="CNIC Number without spaces">



<select>

<option>Select Gender</option>
<option>Male</option>
<option>Female</option>

</select>




<select>

<option>Select City</option>

<option>Lahore</option>
<option>Karachi</option>
<option>Islamabad</option>
<option>Rawalpindi</option>
<option>Faisalabad</option>
<option>Multan</option>
<option>Peshawar</option>
<option>Quetta</option>
<option>Sialkot</option>
<option>Gujranwala</option>
<option>Other</option>

</select>



<h3>License Details</h3>


<select>

<option>License Holder?</option>
<option>Yes</option>
<option>No</option>

</select>


<input placeholder="License Number">



<h3>Vehicle Details</h3>



<select>

<option>Select Vehicle Type</option>
<option>Bike</option>
<option>Car</option>

</select>



<select>

<option>Select Company</option>

<option>Honda</option>
<option>Yamaha</option>
<option>Suzuki</option>
<option>Toyota</option>
<option>Other</option>

</select>



<select>

<option>Select Model</option>

<option>Honda CD 70</option>
<option>Honda CG 125</option>
<option>Honda CB 125F</option>

<option>Toyota Corolla</option>
<option>Toyota Yaris</option>
<option>Honda Civic</option>
<option>Honda City</option>

<option>Suzuki Alto</option>
<option>Suzuki Cultus</option>
<option>Suzuki Wagon R</option>

<option>Carry Dabba</option>

<option>Other</option>

</select>



<select>

<option>Select Model Year</option>

<option>2000</option>
<option>2005</option>
<option>2010</option>
<option>2015</option>
<option>2020</option>
<option>2021</option>
<option>2022</option>
<option>2023</option>
<option>2024</option>
<option>2025</option>
<option>2026</option>

</select>



<input placeholder="Vehicle Registration Number">



<button>

Create Driver Account

</button>



</div>


</body>

  </html>
