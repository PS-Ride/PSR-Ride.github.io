<style>

/* =========================
   PS RIDE PREMIUM UI KIT
========================= */

:root{

/* PRIMARY COLORS */
--primary:#00a86b;
--primary2:#00d084;

/* DARK TEXT */
--text:#111;
--text2:#555;

/* BACKGROUND */
--bg1:#f4fff8;
--bg2:#eefcf4;

/* CARD */
--card:rgba(255,255,255,.82);

}

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

/* PAGE BACKGROUND (UNIFIED) */
body{
min-height:100vh;
background:linear-gradient(135deg,var(--bg1),var(--bg2),#fff);
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

/* GLASS CARD SYSTEM */
.card{
width:100%;
max-width:550px;
background:var(--card);
backdrop-filter:blur(18px);
border-radius:35px;
padding:35px;
box-shadow:0 25px 70px rgba(0,0,0,.12);
animation:fadeIn .5s ease;
}

/* LOGO */
.logo{
text-align:center;
font-size:34px;
font-weight:900;
color:var(--primary);
margin-bottom:15px;
letter-spacing:.5px;
}

/* ICON SYSTEM (NO EMOJI EVER) */
.icon{
width:90px;
height:90px;
margin:auto;
border-radius:28px;
background:linear-gradient(135deg,var(--primary),var(--primary2));
display:flex;
justify-content:center;
align-items:center;
box-shadow:0 20px 50px rgba(0,168,107,.35);
}

/* SVG STANDARD */
.icon svg{
width:50px;
height:50px;
color:white;
}

/* HEADINGS */
h1{
text-align:center;
font-size:30px;
font-weight:900;
color:var(--text);
margin-bottom:10px;
}

h3{
margin-top:20px;
color:var(--primary);
font-size:18px;
font-weight:800;
}

/* INPUT SYSTEM */
input,select{
width:100%;
padding:14px;
margin-top:10px;
border-radius:15px;
border:1px solid #ddd;
outline:none;
transition:.25s;
background:#fff;
}

input:focus,select:focus{
border-color:var(--primary);
box-shadow:0 0 0 4px rgba(0,168,107,.10);
}

/* BUTTON SYSTEM */
button{
width:100%;
padding:16px;
border:none;
border-radius:30px;
font-size:16px;
font-weight:800;
cursor:pointer;
transition:.2s;
margin-top:12px;
}

button:hover{
transform:translateY(-2px);
}

/* PRIMARY BUTTON */
.yes{
background:linear-gradient(135deg,var(--primary),var(--primary2));
color:white;
box-shadow:0 15px 35px rgba(0,168,107,.3);
}

/* SECONDARY BUTTON (NO) */
.no{
background:#000;
color:#fff;
}

/* BACK BUTTON (ONLY BOTTOM RULE) */
.back-btn{
background:#111;
color:#fff;
}

/* HIDDEN SYSTEM */
.hidden{
display:none;
}

/* ANIMATION */
@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

  </style>
