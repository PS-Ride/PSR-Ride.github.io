<!DOCTYPE html>  
<html>  
  
<head>  
  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
  
<title>Driver Signup - PS Ride</title>  
  
<style>  
  
*{  
margin:0;  
padding:0;  
box-sizing:border-box;  
font-family:'Segoe UI',sans-serif;  
}  
  
body{  
min-height:100vh;  
background:  
radial-gradient(circle at top left,#d1ffe8,transparent 40%),  
radial-gradient(circle at bottom right,#d0e7ff,transparent 45%),  
linear-gradient(135deg,#f7fff9,#ffffff);  
display:flex;  
align-items:center;  
justify-content:center;  
padding:20px;  
overflow-x:hidden;  
}  
  
.card{  
width:100%;  
max-width:560px;  
background:rgba(255,255,255,.75);  
backdrop-filter:blur(22px);  
border-radius:38px;  
padding:38px;  
box-shadow:0 25px 80px rgba(0,0,0,.12);  
border:1px solid rgba(255,255,255,.6);  
animation:fadeIn .6s ease;  
position:relative;  
overflow:hidden;  
}  
  
.card::before{  
content:"";  
position:absolute;  
top:-50%;  
left:-50%;  
width:200%;  
height:200%;  
background:radial-gradient(circle,rgba(0,168,107,.08),transparent 60%);  
transform:rotate(25deg);  
}  
  
.logo{  
font-size:36px;  
font-weight:900;  
text-align:center;  
color:#00a86b;  
margin-bottom:18px;  
letter-spacing:1px;  
}  
  
.icon{  
width:92px;  
height:92px;  
margin:auto;  
border-radius:30px;  
background:linear-gradient(135deg,#00a86b,#00d084);  
display:flex;  
align-items:center;  
justify-content:center;  
color:white;  
box-shadow:0 18px 45px rgba(0,168,107,.35);  
margin-bottom:18px;  
}  
  
.icon svg{  
width:54px;  
height:54px;  
}  
  
h1{  
text-align:center;  
font-size:31px;  
font-weight:900;  
color:#111;  
margin-bottom:8px;  
}  
  
.subtitle{  
text-align:center;  
font-size:15px;  
font-weight:600;  
color:#666;  
margin-bottom:25px;  
}  
  
h3{  
margin-top:22px;  
margin-bottom:10px;  
color:#00a86b;  
font-size:19px;  
font-weight:800;  
}  
  
input,select{  
width:100%;  
padding:15px;  
margin-top:10px;  
border-radius:16px;  
border:1px solid rgba(0,0,0,.08);  
font-size:15px;  
outline:none;  
transition:.25s;  
background:rgba(255,255,255,.9);  
box-shadow:inset 0 1px 2px rgba(0,0,0,.04);  
}  
  
input:focus,select:focus{  
border-color:#00a86b;  
box-shadow:0 0 0 4px rgba(0,168,107,.12);  
transform:translateY(-1px);  
}  
  
.phone{  
display:flex;  
gap:10px;  
}  
  
.code{width:30%;}  
.number{width:70%;}  
  
button{  
width:100%;  
padding:16px;  
border:none;  
border-radius:40px;  
font-size:16px;  
font-weight:800;  
cursor:pointer;  
transition:.25s;  
margin-top:16px;  
position:relative;  
overflow:hidden;  
}  
  
button:hover{  
transform:translateY(-3px);  
}  
  
.create-btn{  
background:linear-gradient(135deg,#00a86b,#00d084);  
color:white;  
box-shadow:0 18px 40px rgba(0,168,107,.35);  
}  
  
.create-btn::after{  
content:"";  
position:absolute;  
top:0;left:-100%;  
width:100%;height:100%;  
background:rgba(255,255,255,.25);  
transform:skewX(-25deg);  
transition:.5s;  
}  
  
.create-btn:hover::after{  
left:120%;  
}  
  
.back-btn{  
background:linear-gradient(135deg,#111,#333);  
color:white;  
box-shadow:0 15px 35px rgba(0,0,0,.25);  
display:flex;  
align-items:center;  
justify-content:center;  
gap:10px;  
}  
  
.hidden{display:none;}  
  
@keyframes fadeIn{  
from{opacity:0;transform:translateY(25px);}  
to{opacity:1;transform:translateY(0);}  
}  
  
</style>  
  
</head>  
  
<body>  
  
<div class="card">  
  
<div class="logo">PS Ride</div>  
  
<div class="icon">  
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">  
<path d="M12 2l8 4v6c0 5-3.5 8.5-8 10-4.5-1.5-8-5-8-10V6l8-4z"/>  
<path d="M9 12l2 2 4-4"/>  
</svg>  
</div>  
  
<h1>Driver Registration</h1>  
<p class="subtitle">Create your Driver Account</p>  
  
<h3>Personal Information</h3>  
<input placeholder="First Name (as per Government ID)">  
<input placeholder="Last Name (as per Government ID)">  
  
<div class="phone">  
  <input class="code" value="+92" readonly>  
  <input class="number" placeholder="Phone Number">  
</div>  
  
<input placeholder="Email Address">  
<input placeholder="CNIC Number (without spaces)">  
  
<select>  
  <option>Select Gender</option>  
  <option>Male</option>  
  <option>Female</option>  
</select>  
  
<select>  
  <option>Select City</option>  
  <option>Lahore</option>  
  <option>Karachi</option>  
  <option>Islamabad</option>  
  <option>Rawalpindi</option>  
  <option>Faisalabad</option>  
  <option>Multan</option>  
  <option>Peshawar</option>  
  <option>Quetta</option>  
</select>  
  
<h3>License Information</h3>  
  
<select id="license" onchange="licenseCheck()">  
  <option value="">Do you have License?</option>  
  <option value="yes">Yes</option>  
  <option value="no">No</option>  
</select>  
  
<div id="licenseBox" class="hidden">  
  <input placeholder="License Number">  
</div>  
  
<h3>Vehicle Details</h3>  
  
<select id="vehicleType" onchange="vehicleChange()">  
  <option value="">Select Vehicle Type</option>  
  <option value="Bike">Bike</option>  
  <option value="Car">Car</option>  
</select>  
  
<select id="company">  
  <option>Select Company</option>  
</select>  
  
<select>  
  <option>Select Model</option>  
  <option>Honda CD 70</option>  
  <option>Honda CG 125</option>  
  <option>Honda Civic</option>  
  <option>Toyota Corolla</option>  
  <option>Suzuki Alto</option>  
</select>  
  
<select>  
  <option>Select Model Year</option>  
  <option>2020</option>  
  <option>2021</option>  
  <option>2022</option>  
  <option>2023</option>  
  <option>2024</option>  
  <option>2025</option>  
</select>  
  
<input placeholder="Vehicle Registration Number">  
  
<h3>Upload Documents</h3>  
  
<div class="hidden" id="licenseUpload">  
  <input type="file">  
  <input type="file">  
</div>  
  
<div class="hidden" id="bformUpload">  
  <input type="file">  
</div>  
  
<button class="create-btn" onclick="submitDriver()">  
Create Driver Account  
</button>  
  
<button class="back-btn" onclick="goBack()">  
<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">  
<path d="M15 18l-6-6 6-6"/>  
</svg>  
Back  
</button>  
  
</div>  
  
<script>  
  
function licenseCheck(){  
let val=document.getElementById("license").value;  
let box=document.getElementById("licenseBox");  
box.style.display = (val==="yes") ? "block" : "none";  
}  
  
function vehicleChange(){  
let type=document.getElementById("vehicleType").value;  
let company=document.getElementById("company");  
company.innerHTML="";  
if(type==="Bike"){  
company.innerHTML="<option>Honda</option><option>Yamaha</option><option>Suzuki</option>";  
}  
if(type==="Car"){  
company.innerHTML="<option>Toyota</option><option>Honda</option><option>Suzuki</option>";  
}  
}  
  
function submitDriver(){  
alert("Driver Account Created Successfully (Demo)");  
setTimeout(()=>location.reload(),1500);  
}  
  
function goBack(){  
history.back();  
}  
  
</script>  
  
</body>  
   </html>
