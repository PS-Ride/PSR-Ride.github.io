<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rider Signup - PS Ride</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}


body{

min-height:100vh;

background:
linear-gradient(
135deg,
#f7fff9 0%,
#eefcf4 40%,
#ffffff 100%
);

display:flex;
align-items:center;
justify-content:center;

padding:25px;

}



.card{

width:100%;
max-width:520px;

background:rgba(255,255,255,.75);

backdrop-filter:blur(18px);

padding:35px;

border-radius:35px;

box-shadow:0 30px 80px rgba(0,0,0,.15);

animation:show .6s ease;

}



.logo{

text-align:center;

font-size:34px;

font-weight:900;

color:#00a86b;

margin-bottom:10px;

}



.car{

width:75px;
height:75px;

margin:15px auto;

background:linear-gradient(135deg,#00a86b,#00d084);

border-radius:25px;

display:flex;
align-items:center;
justify-content:center;

color:white;

font-size:35px;

box-shadow:0 20px 40px #00a86b45;

}



h1{

text-align:center;

margin-bottom:25px;

}



input,select{

width:100%;

padding:14px;

margin:8px 0;

border-radius:14px;

border:1px solid #ddd;

outline:none;

background:white;

}



.phone{

display:flex;

gap:10px;

}


.code{

width:30%;

}


.number{

width:70%;

}



button{

width:100%;

padding:15px;

margin-top:12px;

border:none;

border-radius:30px;

font-size:16px;

font-weight:700;

cursor:pointer;

transition:.3s;

}



button:hover{

transform:translateY(-3px);

}



.create{

background:linear-gradient(135deg,#00a86b,#00d084);

color:white;

box-shadow:0 15px 35px #00a86b45;

}



.back{

background:#111;

color:white;

}


.success-icon{

width:85px;
height:85px;

margin:0 auto 25px;

border-radius:50%;

background:linear-gradient(135deg,#00a86b,#00d084);

color:white;

display:flex;
align-items:center;
justify-content:center;

box-shadow:0 20px 50px #00a86b45;

}


.success-icon svg{

width:45px;
height:45px;

  }
  .success-icon.show{

animation:pop .5s ease;

}


@keyframes pop{

0%{
transform:scale(.5);
opacity:0;
}

100%{
transform:scale(1);
opacity:1;
}

}

.success{

display:none;

text-align:center;

  }

.success h2{

color:#00a86b;

margin-bottom:15px;

}



@keyframes show{

from{

opacity:0;
transform:translateY(30px);

}

to{

opacity:1;
transform:translateY(0);

}

}



@media(max-width:600px){

.card{

padding:25px;

}

}



</style>

</head>


<body>



<div class="card">


<div class="logo">
PS Ride
</div>


<div id="form">


<h1>
Rider Signup
</h1>



<input placeholder="First Name (as per Government ID)">



<input placeholder="Last Name (as per Government ID)">



<div class="phone">

<input class="code" value="+92" readonly>

<input class="number" placeholder="Number without 0">

</div>



<input placeholder="Email Address">



<input placeholder="CNIC Number without spaces">



<select>

<option>Select Gender</option>
<option>Male</option>
<option>Female</option>

</select>




<select>

<option>Select City</option>

<option>Lahore</option>
<option>Karachi</option>
<option>Islamabad</option>
<option>Rawalpindi</option>
<option>Other</option>

</select>



<input type="password" placeholder="Create Password">



<input type="password" placeholder="Confirm Password">


<button class="create" onclick="createAccount()">

Create Rider Account

</button>


</div>




<div class="success" id="success">


<div class="success-icon">

<svg 
viewBox="0 0 24 24"
fill="none"
stroke="currentColor"
stroke-width="3"
stroke-linecap="round"
stroke-linejoin="round">

<path d="M20 6L9 17l-5-5"></path>

</svg>

</div>


<h2>
Welcome to PS Ride
</h2>


<p>
Your rider account has been created successfully.
</p>

<button class="back" onclick="history.back()">

⬅ Back

</button>  

<button class="create" onclick="location.href='rider-verification.html'">

Complete KYC Verification

</button>

  <button class="back" onclick="history.back()">

⬅ Back

  </button>


</div>



<script>


function createAccount(){

localStorage.setItem("riderCreated","yes");

document.getElementById("form").style.display="none";

document.getElementById("success").style.display="block";

document.querySelector(".success-icon").classList.add("show");

window.scrollTo(0,0);

}



window.onload=function(){

if(localStorage.getItem("riderCreated")=="yes"){

document.getElementById("form").style.display="none";

document.getElementById("success").style.display="block";

}

   }


</script>



</body>

  </html>
