<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rider Signup - PS Ride</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}

.card{
background:white;
max-width:500px;
margin:auto;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px #ccc;
}

h1{
text-align:center;
}

input,select{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
}

.phone{
display:flex;
gap:10px;
}

.code{
width:30%;
}

.number{
width:70%;
}

button{
width:100%;
padding:14px;
background:#00a86b;
color:white;
border:none;
border-radius:8px;
font-size:16px;
}

</style>

</head>


<body>


<div class="card">


<h1>Rider Signup 🚗</h1>


<input placeholder="First Name (as per Government ID)">


<input placeholder="Last Name (as per Government ID)">



<div class="phone">

<input class="code" value="+92" readonly>

<input class="number" placeholder="Phone number without 0">

</div>



<input placeholder="Email Address">



<input placeholder="CNIC Number without spaces">



<select>

<option>Select Gender</option>
<option>Male</option>
<option>Female</option>

</select>




<select>

<option>Select City</option>

<option>Lahore</option>
<option>Karachi</option>
<option>Islamabad</option>
<option>Rawalpindi</option>
<option>Faisalabad</option>
<option>Multan</option>
<option>Peshawar</option>
<option>Quetta</option>
<option>Gujranwala</option>
<option>Sialkot</option>
<option>Bahawalpur</option>
<option>Hyderabad</option>
<option>Abbottabad</option>
<option>Murree</option>
<option>Gujrat</option>
<option>Sargodha</option>
<option>Sheikhupura</option>
<option>Jhelum</option>
<option>Kasur</option>
<option>Okara</option>
<option>Sahiwal</option>
<option>Mardan</option>
<option>Nawabshah</option>
<option>Sukkur</option>
<option>Larkana</option>
<option>Other</option>

</select>




<input type="password" placeholder="Create Password">


<input type="password" placeholder="Confirm Password">


<button>
Create Rider Account
</button>


</div>


</body>
</html>
