<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rider Verification - PS Ride</title>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}


body{

min-height:100vh;

background:
linear-gradient(
135deg,
#f7fff9,
#eefcf4,
#ffffff
);

display:flex;
align-items:center;
justify-content:center;

padding:25px;

}



.card{

width:100%;
max-width:520px;

background:rgba(255,255,255,.75);

backdrop-filter:blur(18px);

padding:35px;

border-radius:35px;

box-shadow:0 30px 80px rgba(0,0,0,.15);

text-align:center;

animation:show .6s ease;

}



.logo{

font-size:34px;

font-weight:900;

color:#00a86b;

margin-bottom:20px;

}



.icon{

width:85px;
height:85px;

margin:15px auto;

border-radius:25px;

background:linear-gradient(135deg,#00a86b,#00d084);

color:white;

display:flex;
align-items:center;
justify-content:center;

box-shadow:0 20px 50px #00a86b45;

}



.icon svg{

width:45px;
height:45px;

}



h1{

margin:20px 0;

}



p{

margin-bottom:15px;

color:#555;

}



button{

width:100%;

padding:15px;

margin-top:12px;

border:none;

border-radius:30px;

font-weight:700;

font-size:16px;

cursor:pointer;

}



.yes{

background:linear-gradient(135deg,#00a86b,#00d084);

color:white;

}



.no{

background:#111;

color:white;

}



.upload{

display:none;

margin-top:20px;

}



input{

width:100%;

padding:13px;

margin:8px 0;

border-radius:14px;

border:1px solid #ddd;

}



.error{

display:none;

margin-top:20px;

color:#e60000;

font-weight:bold;

}



@keyframes show{

from{

opacity:0;
transform:translateY(30px);

}

to{

opacity:1;
transform:translateY(0);

}

}


</style>

</head>


<body>


<div class="card">


<div class="logo">
PS Ride
</div>


<div class="icon">

<svg viewBox="0 0 24 24"
fill="none"
stroke="currentColor"
stroke-width="2"
stroke-linecap="round"
stroke-linejoin="round">

<path d="M12 2l8 4v6c0 5-3.5 8.5-8 10-4.5-1.5-8-5-8-10V6l8-4z"/>

</svg>

</div>



<h1>
Identity Verification
</h1>


<p>
Do you have your ID Card?
</p>



<button class="yes" onclick="yesID()">
YES
</button>


<button class="no" onclick="noID()">
NO
</button>




<div class="upload" id="upload">


<h3>
Upload ID Card
</h3>


<input type="file">

<input type="file">


<button class="yes">

Submit Verification

</button>


</div>




<div class="error" id="error">

Sorry, you cannot continue without verification.

</div>



</div>



<script>


function yesID(){

document.getElementById("upload").style.display="block";

document.getElementById("error").style.display="none";

}



function noID(){

document.getElementById("upload").style.display="none";

document.getElementById("error").style.display="block";

}


</script>



</body>

  </html>
